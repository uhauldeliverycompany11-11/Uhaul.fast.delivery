<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking</title>

<style>
body { font-family: Arial; background:#f5f5f5; display:flex; justify-content:center; }
.card { background:white; width:320px; padding:20px; margin-top:40px; border-radius:10px; text-align:center; }
.step { display:flex; align-items:center; margin:10px 0; }
.circle { width:18px; height:18px; border-radius:50%; border:2px solid gray; margin-right:10px; }
.done { background:blue; border-color:blue; }
.hold { background:#ffe5e5; color:red; padding:10px; margin-top:15px; border-radius:5px; }
</style>
</head>

<body>

<div class="card">
<h3>Shipment Tracking</h3>

<p><b>Tracking ID:</b> <span id="code"></span></p>
<p><b>Status:</b> <span id="status"></span></p>
<p><b>From:</b> <span id="origin"></span></p>
<p><b>To:</b> <span id="destination"></span></p>
<p><b>Current:</b> <span id="location"></span></p>

<div class="step"><div id="c1" class="circle"></div> Picked</div>
<div class="step"><div id="c2" class="circle"></div> In transit</div>
<div class="step"><div id="c3" class="circle"></div> Out for delivery</div>
<div class="step"><div id="c4" class="circle"></div> Delivered</div>

<div id="holdBox" class="hold" style="display:none;"></div>

<p id="msg"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("tracking").doc("demo").onSnapshot(doc => {
  const d = doc.data();

  document.getElementById("code").innerText = d.code;
  document.getElementById("status").innerText = d.status;
  document.getElementById("origin").innerText = d.origin;
  document.getElementById("destination").innerText = d.destination;
  document.getElementById("location").innerText = d.location;
  document.getElementById("msg").innerText = d.message;

  for(let i=1;i<=d.progress;i++){
    document.getElementById("c"+i).classList.add("done");
  }

  if(d.hold){
    document.getElementById("holdBox").style.display="block";
    document.getElementById("holdBox").innerText =
      "ON HOLD – Pay $" + d.fee;
  }
});
</script>

</body>
</html>
