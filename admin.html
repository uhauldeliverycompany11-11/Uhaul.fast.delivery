<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
</head>

<body style="font-family:Arial;padding:20px;">

<h2>Admin Panel</h2>

<input id="code" placeholder="Tracking Code"><br><br>
<input id="origin" placeholder="Origin"><br><br>
<input id="destination" placeholder="Destination"><br><br>
<input id="location" placeholder="Current Location"><br><br>
<input id="status" placeholder="Status"><br><br>

<select id="progress">
<option value="1">Picked</option>
<option value="2">Transit</option>
<option value="3">Out for delivery</option>
<option value="4">Delivered</option>
</select><br><br>

<label><input type="checkbox" id="hold"> On Hold</label><br><br>

<input id="fee" placeholder="Fee"><br><br>
<input id="message" placeholder="Message"><br><br>

<button onclick="save()">SAVE</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDJrWv097EwSvjNax3MPkMYdSVv2pXZx0I",
  authDomain: "delivery-tracker-de42f.firebaseapp.com",
  projectId: "delivery-tracker-de42f",
  storageBucket: "delivery-tracker-de42f.firebasestorage.app",
  messagingSenderId: "1040500065269",
  appId: "1:1040500065269:web:9640006615f20d3df596bc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function save(){
  db.collection("tracking").doc("demo").set({
    code: code.value,
    origin: origin.value,
    destination: destination.value,
    location: location.value,
    status: status.value,
    progress: Number(progress.value),
    hold: hold.checked,
    fee: fee.value,
    message: message.value
  });

  alert("Saved!");
}
</script>

</body>
</html>
