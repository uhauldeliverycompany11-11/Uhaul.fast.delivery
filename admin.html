<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h2>Update Tracking</h2>

<input id="status" placeholder="Status"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="progress" placeholder="Progress (1-4)"><br><br>

<button onclick="update()">Update</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS",
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function update(){
    db.collection("tracking").doc("123456").update({
        status: document.getElementById("status").value,
        location: document.getElementById("location").value,
        progress: Number(document.getElementById("progress").value)
    });
}
</script>

</body>
</html>
